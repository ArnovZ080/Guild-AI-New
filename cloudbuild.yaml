# Guild AI — Cloud Build Configuration
# Builds the multi-stage Docker image and deploys to Cloud Run

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/guild-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/guild-api:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/guild-api:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/guild-api:latest']

  # Run Alembic migrations
  - name: 'gcr.io/$PROJECT_ID/guild-api:$COMMIT_SHA'
    entrypoint: 'python'
    args: ['-m', 'alembic', 'upgrade', 'head']
    secretEnv: ['DATABASE_URL']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'guild-api'
      - '--image=gcr.io/$PROJECT_ID/guild-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8001'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=guild-database-url:latest,REDIS_URL=guild-redis-url:latest,SECRET_KEY=guild-secret-key:latest,PAYSTACK_SECRET_KEY=guild-paystack-secret:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/guild-database-url/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/guild-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/guild-api:latest'
