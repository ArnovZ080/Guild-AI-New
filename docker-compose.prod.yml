# Guild AI — Production-like local setup
# Usage: docker compose -f docker-compose.prod.yml up --build

services:
  # ── Infrastructure ──
  db:
    image: postgres:15-alpine
    container_name: guild_prod_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: guild
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guild_prod_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: guild_prod_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_prod:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 5s
      retries: 5

  # ── Application (multi-stage build: frontend + backend) ──
  app:
    build: .
    container_name: guild_app
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/guild
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── Celery Worker ──
  celery_worker:
    build: .
    container_name: guild_celery_worker
    restart: always
    command: celery -A services.core.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/guild
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (scheduler) ──
  celery_beat:
    build: .
    container_name: guild_celery_beat
    restart: always
    command: celery -A services.core.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-password}@db:5432/guild
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_prod:
  redis_prod:
  qdrant_prod:
