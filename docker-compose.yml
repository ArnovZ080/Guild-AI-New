# Local development — all services run locally
# For beta/production, services are replaced by free cloud providers
# Set DATABASE_URL, REDIS_URL, QDRANT_URL in .env to override

services:
  # ── Infrastructure (local profile only) ──
  db:
    image: postgres:15-alpine
    container_name: guild_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: guild
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    profiles: ["local"]

  redis:
    image: redis:7-alpine
    container_name: guild_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    profiles: ["local"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: guild_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 5s
      retries: 5
    profiles: ["local"]

  # ── Application ──
  api:
    build: .
    container_name: guild_api
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - media_uploads:/app/uploads/media
    # When using cloud services, override env vars in .env
    # When using local profile, these defaults connect to local containers
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:password@db:5432/guild}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}

  celery_worker:
    build: .
    container_name: guild_celery
    restart: always
    command: celery -A services.core.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:password@db:5432/guild}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}

  celery_beat:
    build: .
    container_name: guild_celery_beat
    restart: always
    command: celery -A services.core.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  media_uploads:
